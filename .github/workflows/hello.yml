name: Hello AI CI/CD

on:
  push:
    branches:
      - main
      - "feature/**"

permissions:
  contents: read
  packages: write

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - run: black --check .

      - run: flake8 .

      - run: pytest

      - name: Build Docker Image
        run: |
          docker build -t hello-ai:${{ github.sha }} .

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push Docker Image
        run: |
          IMAGE_NAME=ghcr.io/${{ github.repository }}/hello-ai:${{ github.sha }}
          docker tag hello-ai:${{ github.sha }} $IMAGE_NAME
          docker push $IMAGE_NAME