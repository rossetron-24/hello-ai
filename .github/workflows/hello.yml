name: Hello AI CI/CD

on:
  push:
    branches:
      - main
      - "feature/**"

  pull_request:
    branches:
      - main

permissions:
  contents: read
  packages: write

jobs:
  ci:
    name: Continuous Integration
    runs-on: ubuntu-latest

    outputs:
      image_tag: ${{ github.sha}}

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Show Installed Packages
        run: |
          python --version
          pip --version
          pip list
          pip check

      - name: Verify Repository Structure
        run: |
          pwd
          ls -la
          find src -maxdepth 3 || true
          find tests -maxdepth 2 || true

      - name: Run Black
        run: |
          black --check src tests

      - name: Run Flake8
        run: |
          flake8 src tests

      - name: Run Pytest
        env:
          PYTHONPATH: ${{ github.workspace }}
        run: |
          python -m pytest -v

      - name: Build Docker Image
        run: |
          docker build -t hello-ai:${{ github.sha }} .

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push Docker Image
        run: |
          IMAGE_NAME=ghcr.io/${{ github.repository }}:${{ github.sha }}
          echo "Pushing image: $IMAGE_NAME"
          docker tag hello-ai:${{ github.sha }} $IMAGE_NAME
          docker push $IMAGE_NAME

  deploy-experiment:
    name: Deploy to Experiment
    needs: ci
    runs-on: ubuntu-latest

    environment:
      name: experiment
    
    steps:
      - name: Deployment Summary
        run: |
          echo "=============================================="
          echo "Deployment Environment : experiment"
          echo "Repository             : ${{ github.repository }}"
          echo "Branch                 : ${{ github.ref_name }}"
          echo "Commit                 : ${{ github.sha }}"
          echo "Actor                  : ${{ github.actor }}"
          echo "Docker Image           : ghcr.io/${{ github.repository }}/hello-ai:${{ github.sha }}"
          echo "=============================================="}}

      - name: Simulate Deployment
        run: |
          echo "Deploying Docker image to Experiment. . . "
          sleep 5
          echo "Deployment to Experiment completed successfully!"