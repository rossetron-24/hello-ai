name: Hello AI CI/CD

on:
  push:
    branches:
      - main
      - "feature/**"

  pull_request:
    branches:
      - main

permissions:
  contents: read
  packages: write

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Show Installed Packages
        run: |
          python --version
          pip --version
          pip list
          pip check

      - name: Verify Repository Structure
        run: |
          pwd
          ls -la
          find src -maxdepth 3 || true
          find tests -maxdepth 2 || true

      - name: Run Black
        run: |
          black --check src tests

      - name: Run Flake8
        run: |
          flake8 src tests

      - name: Run Pytest
        env:
          PYTHONPATH: ${{ github.workspace }}
        run: |
          pytest -v

      - name: Build Docker Image
        run: |
          docker build -t hello-ai:${{ github.sha }} .

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push Docker Image
        run: |
          IMAGE_NAME=ghcr.io/${{ github.repository }}/hello-ai:${{ github.sha }}
          docker tag hello-ai:${{ github.sha }} $IMAGE_NAME
          docker push $IMAGE_NAME